const NAV = [

  { id:'calendar', label:'Lịch quay', icon:'calendar-days',    sub:'Lịch buổi quay theo tháng' },
  { id:'videos',   label:'Video tháng', icon:'clapperboard',   sub:'Tổng hợp video tháng 7' },
];
let current = 'overview';

function buildNav(){
  const nav = $('#nav'); nav.innerHTML='';
  NAV.forEach(n=>{
    const a = el('button', 'nav-item w-full flex items-center gap-3 px-3 h-11 rounded-xl text-[14px] text-ink/80 hover:bg-canvas transition');
    a.innerHTML = `<i data-lucide="${n.icon}" class="nav-ic w-[18px] h-[18px] text-sub"></i>${n.label}`;
    a.onclick = ()=> go(n.id);
    a.dataset.id = n.id;
    nav.appendChild(a);
  });
  lucide.createIcons();
  markNav();
}
function markNav(){ $$('.nav-item').forEach(a=>a.classList.toggle('active', a.dataset.id===current)); }

function go(id){
  current = id;
  const meta = NAV.find(n=>n.id===id);
  $('#pageTitle').textContent = meta.label;
  $('#pageSub').textContent = meta.sub;
  markNav();
  closeSidebar();
  const view = $('#view');
  view.innerHTML='';
  if(id==='overview') renderOverview(view);
  if(id==='calendar') renderCalendar(view);
  if(id==='videos')   renderVideos(view);
  lucide.createIcons();
}

/* ============ VIEW: Calendar ============ */
let calYear = 2026, calMonth = 6;
let calFilter = 'all';

function renderCalendar(root){
  const wrap = el('div','space-y-4');

  const bar = el('div','flex flex-wrap items-center gap-3');
  bar.innerHTML = `
    <div class="flex items-center gap-1 bg-white border border-line rounded-xl p-1 shadow-soft">
      <button id="calPrev" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-canvas"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
      <div id="calLabel" class="px-3 text-[14px] font-bold min-w-[130px] text-center"></div>
      <button id="calNext" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-canvas"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
    </div>
    <button id="calToday" class="h-9 px-3 rounded-xl bg-white border border-line text-[13px] font-medium shadow-soft hover:bg-canvas">Về tháng 7</button>
    <div id="calLegend" class="ml-auto flex flex-wrap items-center gap-2"></div>`;
  wrap.appendChild(bar);

  const grid = el('div','rounded-xl2 border border-line bg-white shadow-soft overflow-x-auto');
  grid.id = 'calGrid';
  wrap.appendChild(grid);

  root.appendChild(wrap);

  const leg = $('#calLegend', wrap);
  const items = [['all','Tất cả','#6B7280'], ...Object.entries(SHOOT_TYPES).filter(([k])=>k!=='other').map(([k,v])=>[k,v.label,v.dot])];
  items.forEach(([k,label,color])=>{
    const b = el('button','inline-flex items-center gap-1.5 h-8 px-2.5 rounded-full text-[12px] font-medium border transition');
    b.innerHTML = `<span class="w-2.5 h-2.5 rounded-full" style="background:${color}"></span>${label}`;
    b.dataset.k = k;
    b.onclick = ()=>{ calFilter = k; drawCal(); };
    leg.appendChild(b);
  });

  $('#calPrev',wrap).onclick = ()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} drawCal(); };
  $('#calNext',wrap).onclick = ()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} drawCal(); };
  $('#calToday',wrap).onclick = ()=>{ calYear=2026; calMonth=6; drawCal(); };

  drawCal();
}

function drawCal(){
  const MON = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const label = $('#calLabel'); if(label) label.textContent = `${MON[calMonth]}, ${calYear}`;
  $$('#calLegend button').forEach(b=>{
    const on = b.dataset.k===calFilter;
    b.classList.toggle('bg-ink', on); b.classList.toggle('text-white', on);
    b.classList.toggle('border-ink', on); b.classList.toggle('border-line', !on);
    b.classList.toggle('bg-white', !on);
  });

  const grid = $('#calGrid'); if(!grid) return;
  const WD = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const first = new Date(calYear, calMonth, 1);
  let startDow = (first.getDay()+6)%7; 
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push({ d: prevDays-startDow+1+i, out:true });
  for(let d=1;d<=daysInMonth;d++) cells.push({ d, out:false });
  while(cells.length%7!==0) cells.push({ d: cells.length-(startDow+daysInMonth)+1, out:true });

  const key = d => `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let html = `<div class="min-w-[900px]">
    <div class="grid grid-cols-7">
      ${WD.map(w=>`<div class="h-11 grid place-items-center bg-navy text-white text-[13px] font-bold tracking-wide border-r border-white/10 last:border-r-0">${w}</div>`).join('')}
    </div>
    <div class="grid grid-cols-7">`;

  cells.forEach((c,idx)=>{
    const events = c.out ? [] : SHOOTS.filter(s=>s.date===key(c.d) && (calFilter==='all'||s.type===calFilter));
    const isSun = idx%7===6;
    html += `<div class="min-h-[132px] border-r border-b border-line p-1.5 ${c.out?'bg-canvas/60':''} ${isSun?'border-r-0':''} align-top">
      <div class="text-[12px] font-semibold ${c.out?'text-sub/50':'text-ink'} px-1 mb-1">${c.d}</div>
      <div class="space-y-1">`;
    events.forEach(ev=>{
      const t = SHOOT_TYPES[ev.type];
      html += `<div class="rounded-lg px-2 py-1.5 text-[11px] leading-snug border" style="background:${t.bg};border-color:${t.bd}">
        ${ev.crew?`<div class="font-bold text-ink">${esc(ev.crew)}</div>`:''}
        <div class="font-semibold text-ink/90 underline decoration-ink/20">${esc(ev.place)}</div>
        ${ev.time?`<div class="font-semibold text-ink/70">${esc(ev.time)}</div>`:''}
        ${ev.note?`<div class="text-danger font-medium mt-0.5">${esc(ev.note)}</div>`:''}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div></div>`;
  grid.innerHTML = html;
  lucide.createIcons();
}

function drawVideos(){

    (vFilterEditor==='all'||v.editor===vFilterEditor) &&
    (vFilterStatus==='all'||v.status===vFilterStatus) &&
    (!vSearch||v.name.toLowerCase().includes(vSearch))
  ).sort((a, b) => a.stt - b.stt);
  
  const cnt = $('#vCount'); if(cnt) cnt.textContent = `${rows.length} video`;
  
  body.innerHTML = rows.map((v,i)=>{
    // Logic tô màu Row: Ưu tiên gấp thì Đỏ, xong rồi thì auto Xanh
    let rowBg = 'bg-white hover:bg-emerald-50/40'; 
    if (v.status === 'Đã xong') rowBg = 'bg-green-50 hover:bg-green-100/70';

      <td class="px-3 py-2.5 text-sub tabular-nums">${esc(v.tra)}</td>

      <td class="px-3 py-2.5">${statusBadge(v.status)}</td>

  }).join('');
  if(!rows.length) body.innerHTML = `<tr><td colspan="12" class="px-3 py-10 text-center text-sub">Không có video nào khớp bộ lọc.</td></tr>`;
  lucide.createIcons();
}

/* ============ Modal Task Logic ============ */
window.currentTaskStt = null;

function setupModalOptions() {
  const edSel = $('#mEditor');
  if (edSel) edSel.innerHTML = EDITORS.map(e => `<option value="${e.id}">${esc(e.short)}</option>`).join('');
  
  const ordSel = $('#mOrder');
  if (ordSel) ordSel.innerHTML = TEAMS.map(t => `<option value="${t}">${esc(t)}</option>`).join('');
}

function openTaskModal(stt) {
  window.currentTaskStt = stt;
  $('#modalTitle').textContent = stt ? 'Chỉnh sửa Task' : 'Thêm Task mới';
  
  // Lấy dữ liệu nếu đang Edit, nếu thêm mới thì để trống
  let v = stt ? VIDEOS.find(x => x.stt === stt) : null;
  
  $('#mName').value = v ? v.name : '';
  $('#mStatus').value = v ? v.status : 'Chờ';
  $('#mEditor').value = v ? v.editor : EDITORS[0].id;
  $('#mOrder').value = v ? v.order : TEAMS[0];
  $('#mCat').value = v ? v.cat : 'Video dài';
  $('#mNhan').value = v ? v.nhan : '';
  $('#mTra').value = v ? v.tra : '';
  $('#mAir').value = v ? v.air : '';
  $('#mUutien').value = v ? v.uutien : '';
  $('#mResize').value = v ? v.resize : '';
  $('#mLink').value = (v && v.link && v.link !== '#') ? v.link : '';

  const m = $('#taskModal');
  m.classList.remove('hidden');
  m.classList.add('flex');
  lucide.createIcons();
}

function closeTaskModal() {
  const m = $('#taskModal');
  m.classList.add('hidden');
  m.classList.remove('flex');
}

function saveTask() {
  const nameVal = $('#mName').value.trim();
  if(!nameVal) { alert('Vui lòng nhập Tên video!'); return; }

  let stt = window.currentTaskStt;
  let v = stt ? VIDEOS.find(x => x.stt === stt) : null;
  let isNew = false;
  
  if(!v) {
    isNew = true;
    let maxStt = VIDEOS.reduce((max, cur) => Math.max(max, cur.stt), 0);
    v = { stt: maxStt + 1 };
  }
  
  v.name = nameVal;
  v.status = $('#mStatus').value;
  v.editor = $('#mEditor').value;
  v.order = $('#mOrder').value;
  v.cat = $('#mCat').value;
  v.nhan = $('#mNhan').value.trim();
  v.tra = $('#mTra').value.trim();
  v.air = $('#mAir').value.trim();
  v.uutien = $('#mUutien').value;
  v.resize = $('#mResize').value.trim();
  let link = $('#mLink').value.trim();
  v.link = link || '#';

  if (isNew) {
    VIDEOS.push(v);
  }

  closeTaskModal();
  if (current === 'videos') {
    drawVideos(); // Render lại bảng
  }
}

function closeSidebar(){ if(window.innerWidth<768){ $('#sidebar').classList.add('hidden'); $('#sidebar').classList.remove('fixed','inset-y-0','left-0','z-40','shadow-2xl'); $('#sbBackdrop').classList.add('hidden'); } }
$('#menuBtn').onclick = openSidebar;
$('#sbBackdrop').onclick = closeSidebar;

/* ============ init ============ */
setupModalOptions();
buildNav();
go('overview');
lucide.createIcons();
</script>
